<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width,initial-scale=1"/>

<title>Al Mukhtar</title>

<style>

body{

  margin:0;
  background:#0f172a;
  color:#fff;

  font-family:Arial;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  height:100vh;

}

img{

  width:120px;
  height:120px;

  border-radius:24px;

}

h1{

  margin-top:20px;

}

#clock{

  font-size:54px;

  margin-top:20px;

  font-weight:bold;

}

#status{

  margin-top:10px;

  opacity:.7;

}

button{

  margin-top:30px;

  background:#0f766e;

  color:#fff;

  border:none;

  padding:14px 20px;

  border-radius:14px;

  font-size:16px;

}

</style>

</head>

<body>

<img src="https://batukessel.github.io/blog-pwa/icon-512.png"/>

<h1>Al Mukhtar</h1>

<div id="clock">
00:00:00
</div>

<div id="status">
Mode Offline Aktif
</div>

<button onclick="location.href='https://almukhtarom.blogspot.com/'">
Buka Blog
</button>

<script>

function updateClock(){

  var d=new Date();

  var h=
  ('0'+d.getHours()).slice(-2);

  var m=
  ('0'+d.getMinutes()).slice(-2);

  var s=
  ('0'+d.getSeconds()).slice(-2);

  document.getElementById(
    'clock'
  ).innerHTML=
    h+':'+m+':'+s;

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
